<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Jetpack Ascender — RoviSoft</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="hud">
    <div id="hud-metros">⬆ 0 m</div>
    <div id="hud-fuel">⚡ Fuel: 100%</div>
    <div id="hud-vida">❤ Vida: 3</div>
    <div id="hud-nivel">ATMÓSFERA</div>
    <div id="hud-barbg"></div>
    <div id="hud-bar"></div>
  </div>

  <div id="panel-capa">
    <div class="capa-flash"></div>
    <div class="capa-box">
      <div class="capa-mini">NUEVA CAPA</div>
      <div class="capa-titulo" id="capa-titulo">ESTRATÓSFERA</div>
      <div class="capa-linea"></div>
    </div>
  </div>

  <div id="panel-inicio" class="panel" style="display:flex;">
    <div class="panel-border"></div>

    <div class="fila-titulo">
      <div class="pj-wrap">
        <div class="pj-body">
          <div class="pj-visor"></div>
          <div class="pj-pack"></div>
        </div>
        <div class="pj-botas">
          <div class="pj-bota"></div>
          <div class="pj-bota"></div>
        </div>
        <div class="pj-llama"></div>
      </div>
      <div class="bloque-titulo">
        <div class="t1">JETPACK</div>
        <div class="t2">ASCENDER</div>
        <div class="t3">▸ VERTICAL SURVIVAL GAME ◂</div>
      </div>
    </div>

    <div class="s-form">
      <label>— INGRESÁ TU NOMBRE —</label>
      <input id="inicio-input" type="text" maxlength="12" placeholder="NOMBRE" autocomplete="off" spellcheck="false">
    </div>

    <div class="fila-botones">
      <button class="btn-jugar" id="inicio-btn">▶ &nbsp; JUGAR</button>
      <button class="btn-ranking" id="btn-ver-ranking">🏆 &nbsp; RANKING</button>
    </div>

    <div class="creditos">Desarrollado por &nbsp;<em>RoviSoft</em> &nbsp;©2025</div>
  </div>

  <div id="panel-ranking">
    <div class="panel-border"></div>
    <h2>🏆 &nbsp; RANKING GLOBAL &nbsp; 🏆</h2>
    <ol id="ranking-ol">
      <li style="color:#1e2e44">Cargando...</li>
    </ol>
    <button class="btn-cerrar" id="btn-cerrar-ranking">✕ &nbsp; CERRAR</button>
    <div class="creditos">RoviSoft ©2025</div>
  </div>

  <div id="panel-gameover" class="panel" style="display:none;">
    <div class="panel-border"></div>
    <div class="go-h2">— GAME OVER —</div>
    <div class="go-metros" id="go-metros">0 m</div>
    <div class="go-msg" id="go-msg"></div>
    <button class="btn-go" id="go-reiniciar">▶ &nbsp; JUGAR DE NUEVO</button>
    <button class="btn-volver" id="go-menu">↩ &nbsp; MENÚ PRINCIPAL</button>
    <br>
    <div class="rk-go">
      <h3>⬡ &nbsp; RANKING GLOBAL &nbsp; ⬡</h3>
      <ol id="go-ranking">
        <li style="color:#1e2e44">Cargando...</li>
      </ol>
    </div>
    <div class="creditos" style="margin-top:10px;">RoviSoft &nbsp;<em>©2025</em></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>

</html>
